services:
  gateway:
    build:
      context: ./backend/gateway-server
      dockerfile: Dockerfile
    container_name: gateway-server
    ports:
      - "3000:3000"
    environment:
      - API_SERVER_URL=http://api:3001
      - WS_SERVER_URL=http://ws:3002
    depends_on:
      - api
      - ws
    networks:
      - backend-network
    restart: unless-stopped

  api:
    build:
      context: ./backend/API-server
      dockerfile: Dockerfile
    container_name: api-server
    ports:
      - "3001:3001"
    environment:
      - MONGO_URL_WEB=${MONGO_URL_WEB}
      - MONGO_URL_LOCAL=${MONGO_URL_LOCAL}
      - DB_LOCAL=${DB_LOCAL}
      - FIREBASE_UDL=${FIREBASE_URL}
    networks:
      - backend-network
    restart: unless-stopped

  ws:
    build:
      context: ./backend/WS-server
      dockerfile: Dockerfile
    container_name: ws-server
    ports:
      - "3002:3002"
    environment:
      - MONGO_URL_WEB=${MONGO_URL_WEB}
      - MONGO_URL_LOCAL=${MONGO_URL_LOCAL}
      - DB_LOCAL=${DB_LOCAL}
    networks:
      - backend-network
    restart: unless-stopped

networks:
  backend-network:
    driver: bridge
